on:
  release:
    types: [released]
jobs:
  publish-to-nuget:
    name: Publish release to NuGet.org
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set VERSION variable from tag
        run: |
          VERSION=$(echo "$GITHUB_REF" | sed -e 's/^[^0-9]\+//g')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Build
        run: dotnet build -c Release --version ${VERSION}
      - name: Test
        run: dotnet test -c Release --no-build --version ${VERSION}
      - name: Pack
        run: dotnet pack -c Release --version ${VERSION}
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: NuGet push
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
